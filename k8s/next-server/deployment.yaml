apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-server
  labels:
    app: next-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: next-server
  template:
    metadata:
      labels:
        app: next-server
    spec:
      containers:
        - name: next-server
          image: ghcr.io/whyredfire/ls-next-server:0d4c9a5ea09f6e24efb06e77c91caafbfb1c4241
          ports:
            - containerPort: 3000
          env:
            - name: TEMP_USER_MAIL
              valueFrom:
                configMapKeyRef:
                  name: temp-user-config
                  key: TEMP_USER_MAIL
            - name: TEMP_USER_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: temp-user-config
                  key: TEMP_USER_PASSWORD
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
